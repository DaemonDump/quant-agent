<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .bg { fill:#0b0f14; }
      .box { fill:#121822; stroke:#2a3646; stroke-width:2; rx:14; ry:14; }
      .title { fill:#e6edf3; font:700 20px "Segoe UI", Arial, sans-serif; }
      .txt { fill:#c9d1d9; font:14px "Segoe UI", Arial, sans-serif; }
      .sub { fill:#9aa7b4; font:12px "Segoe UI", Arial, sans-serif; }
      .arrow { stroke:#d4af37; stroke-width:3; fill:none; marker-end:url(#m); }
      .lane { fill:#0f141c; stroke:#223042; stroke-width:2; rx:18; ry:18; opacity:0.95; }
      .laneTitle { fill:#d4af37; font:700 14px "Segoe UI", Arial, sans-serif; letter-spacing:0.4px; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#d4af37"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860"/>

  <rect class="lane" x="40" y="40" width="1320" height="150"/>
  <text class="laneTitle" x="62" y="68">前端 / 交互层</text>

  <rect class="lane" x="40" y="220" width="1320" height="210"/>
  <text class="laneTitle" x="62" y="248">后端 API（Flask Blueprints）</text>

  <rect class="lane" x="40" y="460" width="1320" height="170"/>
  <text class="laneTitle" x="62" y="488">配置 / 数据层</text>

  <rect class="lane" x="40" y="660" width="1320" height="160"/>
  <text class="laneTitle" x="62" y="688">回测 / ML / 监控计算层</text>

  <rect class="box" x="80" y="85" width="360" height="80"/>
  <text class="title" x="104" y="118">index.html（单页前端）</text>
  <text class="txt" x="104" y="144">数据监控 / 策略配置 / 回测 / 信号 / 监控 / 日志</text>
  <text class="sub" x="104" y="165">app/templates/index.html</text>

  <rect class="box" x="520" y="85" width="820" height="80"/>
  <text class="title" x="544" y="118">用户操作 → API 调用</text>
  <text class="txt" x="544" y="144">axios 请求：/api/market/*、/api/strategy/*、/api/backtest/*、/api/monitor/*</text>

  <rect class="box" x="80" y="270" width="300" height="130"/>
  <text class="title" x="104" y="304">data.py</text>
  <text class="txt" x="104" y="330">指数 / 标的搜索 / Token / 采集触发</text>
  <text class="sub" x="104" y="352">app/routes/data.py</text>

  <rect class="box" x="400" y="270" width="300" height="130"/>
  <text class="title" x="424" y="304">strategy.py</text>
  <text class="txt" x="424" y="330">信号分析：因子 → ML概率 → 仓位 → 下单建议</text>
  <text class="sub" x="424" y="352">app/routes/strategy.py</text>

  <rect class="box" x="720" y="270" width="300" height="130"/>
  <text class="title" x="744" y="304">backtest.py</text>
  <text class="txt" x="744" y="330">回测 / 优化 / 风控 / 过拟合</text>
  <text class="sub" x="744" y="352">app/routes/backtest.py</text>

  <rect class="box" x="1040" y="270" width="300" height="130"/>
  <text class="title" x="1064" y="304">ml.py / monitor.py</text>
  <text class="txt" x="1064" y="330">训练状态 / 导入模型 / 监控状态与日志</text>
  <text class="sub" x="1064" y="352">app/routes/ml.py、monitor.py</text>

  <rect class="box" x="80" y="510" width="360" height="90"/>
  <text class="title" x="104" y="544">strategy_config（策略配置中心）</text>
  <text class="txt" x="104" y="570">StrategyConfig：统一读写 strategy_config.json</text>
  <text class="sub" x="104" y="592">strategy_config/strategy_config.py</text>

  <rect class="box" x="520" y="510" width="360" height="90"/>
  <text class="title" x="544" y="544">SQLite（数据仓）</text>
  <text class="txt" x="544" y="570">行情 / 资金 / settings / positions / trades</text>
  <text class="sub" x="544" y="592">data/tushare/db/quant_data.db</text>

  <rect class="box" x="960" y="510" width="380" height="90"/>
  <text class="title" x="984" y="544">data_ingestion（数据采集入库）</text>
  <text class="txt" x="984" y="570">拉取 TuShare → 清洗 → 写入 SQLite（含指数/行情/资金/估值）</text>
  <text class="sub" x="984" y="592">data_ingestion/data_collector.py、data_ingestion/db_init.py</text>

  <rect class="box" x="80" y="710" width="300" height="90"/>
  <text class="title" x="104" y="744">signal_engine（因子与信号引擎）</text>
  <text class="txt" x="104" y="770">因子评分 / 阈值决策 / 过滤 / 触发</text>
  <text class="sub" x="104" y="792">signal_engine/*</text>

  <rect class="box" x="400" y="710" width="300" height="90"/>
  <text class="title" x="424" y="744">aiagent（ML）</text>
  <text class="txt" x="424" y="770">特征工程 / 训练 / 推理</text>
  <text class="sub" x="424" y="792">aiagent/*</text>

  <rect class="box" x="720" y="710" width="300" height="90"/>
  <text class="title" x="744" y="744">backtest_engine（回测与优化引擎）</text>
  <text class="txt" x="744" y="770">撮合 / 绩效指标 / 参数优化 / 风险评估</text>
  <text class="sub" x="744" y="792">backtest_engine/*</text>

  <rect class="box" x="1040" y="710" width="300" height="90"/>
  <text class="title" x="1064" y="744">live_ops（实盘监控与运维）</text>
  <text class="txt" x="1064" y="770">监控循环 / 异常检测 / 日志 / 紧急处理</text>
  <text class="sub" x="1064" y="792">live_ops/*</text>

  <path class="arrow" d="M440,125 L520,125"/>
  <path class="arrow" d="M700,125 L700,255"/>
  <path class="arrow" d="M700,255 L230,255"/>
  <path class="arrow" d="M700,255 L550,255"/>
  <path class="arrow" d="M700,255 L870,255"/>
  <path class="arrow" d="M700,255 L1190,255"/>

  <path class="arrow" d="M550,400 L260,510"/>
  <path class="arrow" d="M870,400 L700,510"/>
  <path class="arrow" d="M230,400 L700,510"/>
  <path class="arrow" d="M960,555 L880,555"/>

  <path class="arrow" d="M260,600 L230,710"/>
  <path class="arrow" d="M700,600 L870,710"/>
  <path class="arrow" d="M700,600 L550,710"/>
  <path class="arrow" d="M1190,400 L1190,510"/>

  <text class="sub" x="82" y="835">Matrix Signal 2.0 / 矩测系统2.0 · 端到端链路示意（生成于项目文档）</text>
</svg>
